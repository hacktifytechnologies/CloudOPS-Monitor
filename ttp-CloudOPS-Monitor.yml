      platform: linux
      command: |
        git clone https://github.com/hacktifytechnologies/CloudOPS-Monitor /opt/hacktify/CloudOPS-Monitor && cd /opt/hacktify/CloudOPS-Monitor && docker compose up -d --build && echo 'Lab deployment complete'
